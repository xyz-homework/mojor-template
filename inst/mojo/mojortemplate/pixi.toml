[workspace]
authors = ["XYZ Homework <opensource@xyzhomework.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "mojortemplate"
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]
version = "0.1.0"

[tasks]
build-dylib = "mojo build mojortemplate.mojo --emit shared-lib -o ../../../inst/libs/libmojortemplate.dylib"
build-so    = "mojo build mojortemplate.mojo --emit shared-lib -o ../../../inst/libs/libmojortemplate.so"

[dependencies]
mojo = "0.26.2.*"

[target.osx-arm64.dependencies]
clang = ">=21.1.4,<22"

[target.linux-aarch64.dependencies]
gcc = ">=15.2.0,<15.3"
