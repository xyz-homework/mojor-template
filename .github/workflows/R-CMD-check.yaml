# R CMD check + Mojo build smoke test.
# Two jobs:
#   - no-mojo: confirms the package installs without a Mojo toolchain
#              (MOJORTEMPLATE_NO_BUILD fallback path).
#   - with-mojo: builds the Mojo shared lib first, then runs R CMD check.
#
# Security note: no untrusted event inputs are used in run: blocks.
name: R-CMD-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  no-mojo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: 'release' }
      - uses: r-lib/actions/setup-r-dependencies@v2
        with: { extra-packages: any::rcmdcheck }
      - uses: r-lib/actions/check-r-package@v2
        with: { upload-snapshots: true }

  with-mojo:
    runs-on: ubuntu-latest
    env:
      MOJORTEMPLATE_BUILD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with: { pixi-version: latest }
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: 'release' }
      - uses: r-lib/actions/setup-r-dependencies@v2
        with: { extra-packages: any::rcmdcheck }
      - name: Pre-build Mojo shared lib
        working-directory: inst/mojo/mojortemplate
        run: |
          pixi install
          pixi run mojo --version
          mkdir -p ../../../inst/libs
          pixi run mojo build mojortemplate.mojo --emit shared-lib \
            -o ../../../inst/libs/libmojortemplate.so
          nm -D --defined-only ../../../inst/libs/libmojortemplate.so | grep '^.* T mt_' || \
            (echo "expected exported symbols mt_* missing" && exit 1)
      - uses: r-lib/actions/check-r-package@v2
        with: { upload-snapshots: true }
